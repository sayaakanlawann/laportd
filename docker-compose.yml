

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tvri_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - tvri_network

  web:
    image: nginx:alpine
    container_name: tvri_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tvri_network

networks:
  tvri_network:
    driver: bridge