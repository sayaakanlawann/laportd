

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tvri_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - tvri_network

  web:
    image: nginx:alpine
    container_name: tvri_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tvri_network

  mysql:
      image: mysql:8.0
      container_name: tvri_mysql
      restart: unless-stopped
      ports:
        - "3307:3306"
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: tvri_laporan
      volumes:
        - mysql_data:/var/lib/mysql
      networks:
        - tvri_network # Sesuaikan dengan nama network di docker-compose kamu (misal: app-network)

  # 2. Mesin phpMyAdmin (Biar gampang lihat isi database)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tvri_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80" # Akses phpMyAdmin di localhost:8080
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    networks:
      - tvri_network # Sesuaikan dengan nama network di docker-compose kamu
      
# Tambahkan ini di paling bawah file jika belum ada

networks:
  tvri_network:
    driver: bridge

volumes:
  mysql_data:


